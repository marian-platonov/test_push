# Pipeline uses stages so approvals can pause execution between stages
stages:

# =========================
# BUILD STAGE (no approval)
# =========================
- stage: Build
  displayName: Build & Validate
  jobs:
  - job: PackAndValidate
    displayName: Pack and validate artifacts
    pool: Default
    workspace:
      clean: all

    steps:
    - task: PowerShell@2
      displayName: 'Test UiPath cloud access_token retrieval'
      inputs:
        targetType: 'inline'
        script: |
          $headers = @{
            "Content-Type" = "application/x-www-form-urlencoded"
          }

          $body = "grant_type=client_credentials&client_id=12345&client_secret=REPLACE_ME&scope=OR.Assets OR.BackgroundTasks OR.Execution"

          try {
            $response = Invoke-RestMethod `
              -Uri 'https://cloud.uipath.com/identity_/connect/token' `
              -Method POST `
              -Headers $headers `
              -Body $body

            Write-Host "Token retrieved successfully"
          }
          catch {
            Write-Error "Failed to retrieve token"
            throw
          }

# ======================================
# DEPLOY STAGE (WITH ENV APPROVAL)
# ======================================
- stage: Deploy_NonProd
  displayName: Deploy to NonProd
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployUiPath
    displayName: Deploy UiPath package
    environment: uipath-nonprod   # 👈 THIS is where approvals attach
    pool: Default

    strategy:
      runOnce:
        deploy:
          steps:
          - task: PowerShell@2
            displayName: 'Deploy package to UiPath NonProd'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Deploying NuGet / UiPath package to NonProd..."
